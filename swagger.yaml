openapi: 3.0.3
info:
  title: API de Agendamento Médico
  version: 1.0.0
  description: API RESTful para agendamento, gerenciamento de consultas, agenda e documentos com usuários Admin, Médico e Paciente
servers:
  - url: http://localhost:3000/api

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    # Usuário (base)
    UsuarioBase:
      type: object
      properties:
        id:
          type: string
          example: "user123"
        nome:
          type: string
          example: "João da Silva"
        email:
          type: string
          format: email
          example: "joao@email.com"
        role:
          type: string
          enum: [admin, medico, paciente]
          example: paciente

    # Consulta completa
    Consulta:
      allOf:
        - $ref: '#/components/schemas/BaseEntity'
        - type: object
          properties:
            paciente:
              $ref: '#/components/schemas/UsuarioBase'
            medico:
              $ref: '#/components/schemas/UsuarioBase'
            dataHora:
              type: string
              format: date-time
              example: '2025-07-20T14:30:00Z'
            status:
              type: string
              enum: [agendada, confirmada, cancelada, concluida]
              example: agendada
            tipoConsulta:
              type: string
              example: "Consulta Geral"
            observacoes:
              type: string
              example: "Paciente relatou dor de cabeça."

    ConsultaInput:
      type: object
      required:
        - pacienteId
        - medicoId
        - dataHora
        - tipoConsulta
      properties:
        pacienteId:
          type: string
          example: "user123"
        medicoId:
          type: string
          example: "medico123"
        dataHora:
          type: string
          format: date-time
          example: '2025-07-20T14:30:00Z'
        status:
          type: string
          enum: [agendada, confirmada, cancelada, concluida]
          default: agendada
        tipoConsulta:
          type: string
          example: "Consulta Geral"
        observacoes:
          type: string

    BaseEntity:
      type: object
      properties:
        id:
          type: string
          example: "abc123"

    Agenda:
      type: object
      properties:
        id:
          type: string
          example: "agenda001"
        medicoId:
          type: string
          example: "medico123"
        data:
          type: string
          format: date
          example: "2025-07-20"
        horariosDisponiveis:
          type: array
          items:
            type: string
            example: "14:00"
        bloqueios:
          type: array
          items:
            type: string
            example: "12:00"

    AgendaInput:
      type: object
      required:
        - medicoId
        - data
        - horariosDisponiveis
      properties:
        medicoId:
          type: string
          example: "medico123"
        data:
          type: string
          format: date
          example: "2025-07-20"
        horariosDisponiveis:
          type: array
          items:
            type: string
        bloqueios:
          type: array
          items:
            type: string

    Documento:
      type: object
      properties:
        id:
          type: string
          example: "doc001"
        pacienteId:
          type: string
          example: "paciente123"
        tipo:
          type: string
          example: "receita"
        nomeArquivo:
          type: string
          example: "receita-julho.pdf"
        url:
          type: string
          example: "https://meusite.com/documentos/receita-julho.pdf"
        dataCriacao:
          type: string
          format: date-time
          example: "2025-07-10T10:00:00Z"

    DocumentoInput:
      type: object
      required:
        - pacienteId
        - tipo
        - nomeArquivo
        - url
      properties:
        pacienteId:
          type: string
        tipo:
          type: string
          example: "receita"
        nomeArquivo:
          type: string
        url:
          type: string
          format: uri

    AdminUser:
      type: object
      properties:
        id:
          type: string
          example: "admin001"
        nome:
          type: string
          example: "Admin Geral"
        email:
          type: string
          format: email
          example: "admin@clinica.com"
        role:
          type: string
          enum: [admin, medico, paciente]
          example: admin

    AdminUserInput:
      type: object
      required:
        - nome
        - email
        - role
      properties:
        nome:
          type: string
        email:
          type: string
          format: email
        role:
          type: string
          enum: [admin, medico, paciente]

security:
  - bearerAuth: []

paths:

  # Consultas
  /consultas:
    get:
      summary: Listar consultas (Admin vê todas, Médico vê só suas, Paciente vê só as suas)
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum: [agendada, confirmada, cancelada, concluida]
          description: Filtrar por status da consulta
        - in: query
          name: medicoId
          schema:
            type: string
          description: Filtrar consultas por médico (Admin ou Médico)
        - in: query
          name: pacienteId
          schema:
            type: string
          description: Filtrar consultas por paciente (Admin ou Paciente)
      responses:
        '200':
          description: Lista de consultas filtradas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Consulta'

    post:
      summary: Criar uma consulta (Paciente agenda, Admin pode criar para qualquer um)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConsultaInput'
      responses:
        '201':
          description: Consulta criada

  /consultas/{id}:
    get:
      summary: Obter consulta pelo ID (restrito a Admin, Médico responsável e Paciente)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Consulta encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Consulta'
        '403':
          description: Acesso negado
        '404':
          description: Consulta não encontrada

    put:
      summary: Atualizar consulta (Admin e Médico podem alterar status e detalhes, Paciente pode remarcar/cancelar)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConsultaInput'
      responses:
        '200':
          description: Consulta atualizada

    delete:
      summary: Cancelar ou deletar consulta (Admin e Paciente podem cancelar)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Consulta cancelada/deletada

  # Agenda
  /agenda:
    get:
      summary: Listar agendas (Admin vê todas, Médico vê as suas)
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: medicoId
          schema:
            type: string
          description: Filtrar por médico
        - in: query
          name: data
          schema:
            type: string
            format: date
          description: Filtrar por data
      responses:
        '200':
          description: Lista de agendas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Agenda'

    post:
      summary: Criar ou atualizar agenda (Somente Admin e Médico)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgendaInput'
      responses:
        '201':
          description: Agenda criada ou atualizada

  /agenda/{id}:
    get:
      summary: Obter agenda pelo ID
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Agenda encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Agenda'
        '404':
          description: Agenda não encontrada

    delete:
      summary: Deletar agenda (Admin e Médico)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Agenda deletada

  # Documentos
  /documentos:
    get:
      summary: Listar documentos do paciente autenticado (Admin vê todos)
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: pacienteId
          schema:
            type: string
          description: Filtrar documentos por paciente (Admin)
      responses:
        '200':
          description: Lista de documentos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Documento'

    post:
      summary: Upload de documento (simulado)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DocumentoInput'
      responses:
        '201':
          description: Documento criado

  /documentos/{id}:
    get:
      summary: Obter documento pelo ID
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Documento encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Documento'
        '404':
          description: Documento não encontrado

    delete:
      summary: Deletar documento (Admin e Paciente dono do documento)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Documento deletado

  # Admin - gerenciamento usuários
  /admin/users:
    get:
      summary: Listar todos os usuários (Admin)
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Lista de usuários
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UsuarioBase'

    post:
      summary: Criar novo usuário (Admin)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - nome
                - email
                - role
                - senha
              properties:
                nome:
                  type: string
                  example: "Maria da Silva"
                email:
                  type: string
                  format: email
                  example: "maria@email.com"
                role:
                  type: string
                  enum: [admin, medico, paciente]
                  example: medico
                senha:
                  type: string
                  format: password
      responses:
        '201':
          description: Usuário criado

  /admin/users/{id}:
    get:
      summary: Obter usuário pelo ID (Admin)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Usuário encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UsuarioBase'
        '404':
          description: Usuário não encontrado

    put:
      summary: Atualizar usuário (Admin)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                nome:
                  type: string
                email:
                  type: string
                  format: email
                role:
                  type: string
                  enum: [admin, medico, paciente]
      responses:
        '200':
          description: Usuário atualizado

    delete:
      summary: Deletar usuário (Admin)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Usuário deletado
